<ion-content class="login-content">
  <div class="login-container">
    <div class="logo-area">
      <ion-icon name="checkmark-circle" class="logo-icon"></ion-icon>
      <h1>Seti Todo</h1>
      <p>Organiza tu día, siempre sincronizado</p>
    </div>

    <ion-card class="form-card">
      <ion-card-content>
        <ion-item lines="none" class="input-item">
          <ion-input
            label="Correo electrónico"
            labelPlacement="floating"
            type="email"
            placeholder="tu@correo.com"
            [value]="email"
            (ionInput)="email = $event.detail.value ?? ''">
          </ion-input>
        </ion-item>

        <ion-item lines="none" class="input-item">
          <ion-input
            label="Contraseña"
            labelPlacement="floating"
            type="password"
            placeholder="••••••••"
            [value]="password"
            (ionInput)="password = $event.detail.value ?? ''">
          </ion-input>
        </ion-item>

        @if (error) {
          <p class="error-msg">{{ error }}</p>
        }

        <ion-button
          expand="block"
          class="submit-btn"
          [disabled]="loading"
          (click)="login()">
          @if (loading) {
            <ion-spinner name="crescent"></ion-spinner>
          } @else {
            Iniciar sesión
          }
        </ion-button>

        <ion-button
          expand="block"
          fill="clear"
          class="link-btn"
          routerLink="/register">
          ¿No tienes cuenta? <strong>&nbsp;Regístrate</strong>
        </ion-button>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
