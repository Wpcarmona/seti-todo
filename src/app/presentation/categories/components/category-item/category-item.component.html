<ion-item-sliding>
  <ion-item>
    <div
      slot="start"
      class="color-dot"
      [style.background]="category().color"
    ></div>
    <ion-label>{{ category().name }}</ion-label>
  </ion-item>

  <ion-item-options side="end">
    <ion-item-option color="primary" (click)="edited.emit(category())">
      <ion-icon slot="icon-only" name="pencil"></ion-icon>
    </ion-item-option>
    <ion-item-option color="danger" (click)="deleted.emit(category().id)">
      <ion-icon slot="icon-only" name="trash"></ion-icon>
    </ion-item-option>
  </ion-item-options>
</ion-item-sliding>
