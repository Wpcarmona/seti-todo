<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/task-list"></ion-back-button>
    </ion-buttons>
    <ion-title>Categorías</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list>
    @for (cat of (categories$ | async) ?? []; track cat.id) {
    <app-category-item
      [category]="cat"
      (edited)="openEdit($event)"
      (deleted)="onDeleteCategory($event)"
    >
    </app-category-item>
    } @empty {
    <app-empty-state message="No hay categorías aún"></app-empty-state>
    }
  </ion-list>

  <ion-fab slot="fixed" vertical="bottom" horizontal="end">
    <ion-fab-button (click)="openCreate()">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>

  <ion-modal [isOpen]="isModalOpen$ | async" (didDismiss)="closeModal()">
    <ng-template>
      <ion-header>
        <ion-toolbar>
          <ion-title
            >{{ (editingCategory$ | async) ? 'Editar categoría' : 'Nueva categoría'
            }}</ion-title
          >
          <ion-buttons slot="end">
            <ion-button (click)="closeModal()">Cerrar</ion-button>
          </ion-buttons>
        </ion-toolbar>
      </ion-header>
      <ion-content>
        <app-category-form
          [editingCategory]="editingCategory$ | async"
          (formSubmitted)="onFormSubmitted($event)"
        >
        </app-category-form>
      </ion-content>
    </ng-template>
  </ion-modal>
</ion-content>
