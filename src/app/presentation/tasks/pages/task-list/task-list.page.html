<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Mis Tareas</ion-title>
    @if (remoteConfig.showCategories()) {
      <ion-buttons slot="end">
        <ion-button routerLink="/category-list">
          <ion-icon name="pricetag" slot="icon-only"></ion-icon>
        </ion-button>
      </ion-buttons>
    }
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-refresher slot="fixed" (ionRefresh)="onRefresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <div class="header-stats">
    <div>
      <div class="stats-count">{{ pendingCount() }}</div>
      <div class="stats-label">pendientes</div>
    </div>
    <div class="stats-text">{{ filteredTasks().length }} en total</div>
  </div>

  @if (remoteConfig.showCategories()) {
    <div class="category-chips">
      <ion-chip
        [class.active]="selectedCategoryId() === null"
        (click)="selectCategory(null)">
        Todas
      </ion-chip>
      @for (cat of categories(); track cat.id) {
        <ion-chip
          [class.active]="selectedCategoryId() === cat.id"
          [style.--background]="selectedCategoryId() === cat.id ? cat.color + '22' : ''"
          [style.color]="selectedCategoryId() === cat.id ? cat.color : ''"
          (click)="selectCategory(cat.id)">
          {{ cat.name }}
        </ion-chip>
      }
    </div>
  }

  <cdk-virtual-scroll-viewport itemSize="72" class="task-viewport">
    <app-task-item
      *cdkVirtualFor="let task of filteredTasks()"
      [task]="task"
      [category]="getCategoryForTask(task)"
      (toggled)="onToggleTask($event)"
      (deleted)="onDeleteTask($event)">
    </app-task-item>
    @if (filteredTasks().length === 0) {
      <app-empty-state message="No hay tareas. ¡Agrega una!"></app-empty-state>
    }
  </cdk-virtual-scroll-viewport>

  <ion-fab slot="fixed" vertical="bottom" horizontal="end">
    <ion-fab-button (click)="isModalOpen.set(true)">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>

  <ion-modal [isOpen]="isModalOpen()" (didDismiss)="isModalOpen.set(false)">
    <ng-template>
      <ion-header>
        <ion-toolbar>
          <ion-title>Nueva tarea</ion-title>
          <ion-buttons slot="end">
            <ion-button (click)="isModalOpen.set(false)">Cerrar</ion-button>
          </ion-buttons>
        </ion-toolbar>
      </ion-header>
      <ion-content>
        <app-task-form
          [categories]="categories()"
          (taskCreated)="onTaskCreated($event)">
        </app-task-form>
      </ion-content>
    </ng-template>
  </ion-modal>
</ion-content>
