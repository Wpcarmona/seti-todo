<ion-item-sliding>
  <ion-item [class.task-completed]="task().completed" lines="none">
    <ion-checkbox
      slot="start"
      [checked]="task().completed"
      (ionChange)="toggle()">
    </ion-checkbox>
    <ion-label>
      <h2>{{ task().title }}</h2>
      @if (category()) {
        <p class="category-name" [style.color]="category()!.color">
          {{ category()!.name }}
        </p>
      }
    </ion-label>
  </ion-item>

  <ion-item-options side="end">
    <ion-item-option color="danger" (click)="delete()">
      <ion-icon slot="icon-only" name="trash"></ion-icon>
    </ion-item-option>
  </ion-item-options>
</ion-item-sliding>
