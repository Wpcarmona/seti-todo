<ion-item-sliding>
  <ion-item [class.task-completed]="task().completed">
    <ion-checkbox
      slot="start"
      [checked]="task().completed"
      (ionChange)="toggle()"
    >
    </ion-checkbox>
    <ion-label>
      <h2>{{ task().title }}</h2>
      @if (category()) {
        <ion-chip [style.--background]="category()!.color" size="small">
          {{ category()!.name }}
        </ion-chip>
      }
    </ion-label>
  </ion-item>

  <ion-item-options side="end">
    <ion-item-option color="danger" (click)="delete()">
      <ion-icon slot="icon-only" name="trash"></ion-icon>
    </ion-item-option>
  </ion-item-options>
</ion-item-sliding>
