<div class="form-inner">
  <ion-item>
    <ion-input
      label="Título de la tarea"
      labelPlacement="floating"
      placeholder="¿Qué necesitas hacer?"
      [value]="title()"
      (ionInput)="title.set($event.detail.value ?? '')">
    </ion-input>
  </ion-item>

  <ion-item>
    <ion-select
      label="Categoría"
      labelPlacement="floating"
      placeholder="Sin categoría"
      (ionChange)="selectedCategoryId.set($event.detail.value)">
      @for (cat of categories(); track cat.id) {
        <ion-select-option [value]="cat.id">{{ cat.name }}</ion-select-option>
      }
    </ion-select>
  </ion-item>

  <ion-button expand="block" (click)="submit()" [disabled]="!title().trim()">
    Agregar tarea
  </ion-button>
</div>
